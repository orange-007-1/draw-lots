<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抽签系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0c0c2e 0%, #1a1a3e 100%);
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        
        .tech-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        
        .grid-line {
            position: absolute;
            background: rgba(0, 247, 255, 0.05);
        }
        
        .grid-line.horizontal {
            width: 100%;
            height: 1px;
        }
        
        .grid-line.vertical {
            width: 1px;
            height: 100%;
        }
        
        .glowing-dots {
            position: absolute;
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background-color: #00f7ff;
            box-shadow: 0 0 10px 2px #00f7ff;
            animation: pulse 3s infinite alternate;
        }
        
        @keyframes pulse {
            0% { opacity: 0.3; }
            100% { opacity: 0.8; }
        }
        
        header {
            text-align: center;
            padding: 25px 20px;
            background: rgba(0, 20, 40, 0.7);
            border-bottom: 1px solid rgba(0, 247, 255, 0.3);
            box-shadow: 0 5px 20px rgba(0, 0, 50, 0.5);
            position: relative;
            overflow: hidden;
        }
        
        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00f7ff, transparent);
            animation: headerGlow 3s infinite;
        }
        
        @keyframes headerGlow {
            0% { left: -100%; }
            100% { left: 100%; }
        }
        
        h1 {
            font-size: 42px;
            font-weight: 700;
            background: linear-gradient(90deg, #00f7ff, #66ccff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 15px rgba(0, 247, 255, 0.5);
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #a0d2ff;
            font-size: 16px;
            letter-spacing: 1px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        
        .control-panel {
            background: rgba(0, 30, 60, 0.7);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(0, 150, 255, 0.3);
            box-shadow: 0 5px 20px rgba(0, 20, 60, 0.5);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }
        
        .control-group {
            background: rgba(0, 40, 80, 0.5);
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid;
        }
        
        .control-group.list1 {
            border-left-color: #00f7ff;
        }
        
        .control-group.list2 {
            border-left-color: #66ccff;
        }
        
        .control-title {
            font-size: 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .list1 .control-title {
            color: #00f7ff;
        }
        
        .list2 .control-title {
            color: #66ccff;
        }
        
        .control-item {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #b0d0ff;
            font-weight: 500;
        }
        
        select {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 60, 120, 0.6);
            border: 1px solid rgba(0, 150, 255, 0.4);
            border-radius: 8px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }
        
        select:focus {
            border-color: #00f7ff;
            box-shadow: 0 0 10px rgba(0, 247, 255, 0.5);
        }
        
        .blue-select {
            color: #66ccff;
            font-weight: 500;
        }
        
        .tail-number-section {
            background: rgba(0, 30, 60, 0.7);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(0, 150, 255, 0.3);
            box-shadow: 0 5px 20px rgba(0, 20, 60, 0.5);
        }
        
        .tail-number-title {
            font-size: 20px;
            color: #a0d2ff;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .tail-number-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        
        .tail-number {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 100, 200, 0.3);
            border-radius: 50%;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        
        .tail-number:hover {
            background: rgba(0, 150, 255, 0.5);
            transform: translateY(-2px);
        }
        
        .tail-number.selected {
            background: #00f7ff;
            color: #003366;
            border-color: #00f7ff;
            box-shadow: 0 0 10px #00f7ff;
        }
        
        .tail-note {
            margin-top: 10px;
            font-size: 14px;
            color: #a0d2ff;
        }
        
        .button-panel {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin: 30px 0;
        }
        
        .btn {
            padding: 15px 35px;
            border-radius: 10px;
            border: none;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .btn i {
            font-size: 20px;
        }
        
        .btn-start {
            background: linear-gradient(135deg, #0066ff, #00ccff);
            color: white;
        }
        
        .btn-start:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 102, 255, 0.4);
        }
        
        .btn-stop {
            background: linear-gradient(135deg, #ff3333, #ff6666);
            color: white;
        }
        
        .btn-stop:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 51, 51, 0.4);
        }
        
        .btn-reset {
            background: linear-gradient(135deg, #9933ff, #cc66ff);
            color: white;
        }
        
        .btn-reset:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(153, 51, 255, 0.4);
        }
        
        .rolling-display {
            background: rgba(0, 20, 40, 0.8);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(0, 150, 255, 0.2);
            box-shadow: 0 5px 20px rgba(0, 20, 60, 0.5);
            min-height: 220px;
            display: flex;
            flex-direction: column;
        }
        
        .rolling-title {
            font-size: 22px;
            color: #a0d2ff;
            margin-bottom: 20px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .rolling-area {
            flex-grow: 1;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            align-items: center;
            justify-items: center;
        }
        
        .name-slot {
            width: 100%;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 40, 80, 0.6);
            border-radius: 10px;
            font-size: 20px;
            font-weight: 600;
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(0, 150, 255, 0.2);
        }
        
        .name-slot.rolling {
            background: rgba(0, 60, 120, 0.7);
            border-color: rgba(0, 247, 255, 0.5);
            box-shadow: 0 0 10px rgba(0, 247, 255, 0.3);
        }
        
        .name-slot.list1 {
            color: #00f7ff;
        }
        
        .name-slot.list2 {
            color: #66ccff;
        }
        
        .name-slot.special {
            color: #ff9900;
            border-color: rgba(255, 153, 0, 0.5);
            background: rgba(255, 153, 0, 0.1);
        }
        
        .result-display {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 30px;
            margin-top: 20px;
        }
        
        .result-panel {
            background: rgba(0, 30, 60, 0.7);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(0, 150, 255, 0.3);
            box-shadow: 0 5px 20px rgba(0, 20, 60, 0.5);
        }
        
        .result-title {
            font-size: 24px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid;
        }
        
        .result-title.list1 {
            color: #00f7ff;
            border-bottom-color: #00f7ff;
        }
        
        .result-title.list2 {
            color: #66ccff;
            border-bottom-color: #66ccff;
        }
        
        .result-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 10px;
        }
        
        .result-list::-webkit-scrollbar {
            width: 8px;
        }
        
        .result-list::-webkit-scrollbar-track {
            background: rgba(0, 40, 80, 0.5);
            border-radius: 4px;
        }
        
        .result-list::-webkit-scrollbar-thumb {
            background: #00aaff;
            border-radius: 4px;
        }
        
        .result-item {
            padding: 12px 10px;
            text-align: center;
            background: rgba(0, 60, 120, 0.4);
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s;
            border: 1px solid transparent;
        }
        
        .result-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(0, 100, 200, 0.2);
        }
        
        .result-item.list1 {
            color: #00f7ff;
        }
        
        .result-item.list2 {
            color: #66ccff;
        }
        
        .result-item.special {
            color: #ff9900;
            border-color: rgba(255, 153, 0, 0.5);
            background: rgba(255, 153, 0, 0.1);
        }
        
        .result-item.high-prob {
            border-color: rgba(0, 247, 255, 0.5);
            background: rgba(0, 247, 255, 0.1);
        }
        
        .status-indicator {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 25px;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
            padding: 10px 20px;
            border-radius: 20px;
            background: rgba(0, 40, 80, 0.5);
        }
        
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        
        .status-dot.active {
            background-color: #00ff00;
            box-shadow: 0 0 10px #00ff00;
        }
        
        .status-dot.inactive {
            background-color: #666;
        }
        
        .group-info {
            background: rgba(0, 40, 80, 0.5);
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            border-left: 4px solid #ff9900;
        }
        
        .group-info-title {
            color: #ff9900;
            font-weight: 600;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .group-info-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
        }
        
        .info-item {
            padding: 8px;
            background: rgba(0, 60, 120, 0.3);
            border-radius: 5px;
            font-size: 14px;
        }
        
        .process-info {
            background: rgba(0, 40, 80, 0.5);
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
            border-left: 4px solid #66ccff;
        }
        
        .process-title {
            color: #66ccff;
            font-weight: 600;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .process-steps {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .process-step {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            background: rgba(0, 60, 120, 0.3);
            border-radius: 5px;
        }
        
        .step-number {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #00aaff;
            border-radius: 50%;
            font-size: 12px;
            font-weight: bold;
        }
        
        @media (max-width: 1100px) {
            .result-display {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 768px) {
            .control-panel {
                grid-template-columns: 1fr;
            }
            
            .button-panel {
                flex-direction: column;
                align-items: center;
            }
            
            .btn {
                width: 100%;
                max-width: 300px;
                justify-content: center;
            }
            
            .result-display {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 32px;
            }
        }
        
        @keyframes glow {
            0% { opacity: 0.7; }
            100% { opacity: 1; }
        }
        
        .glowing {
            animation: glow 1s infinite alternate;
        }
    </style>
</head>

    <div class="container">

            <div class="control-group list2">

        <div class="button-panel">

            <button class="btn btn-reset" id="resetBtn">

        </div>
        
        <div class="rolling-display">

            <div class="rolling-area" id="rollingArea">

        </div>
                
        <div class="result-display">
            <div class="result-panel">
                <h2 class="result-title list1">

                <div class="result-list" id="list1Result">

                </div>
            </div>
            
            <div class="result-panel">

                    <i class="fas fa-users"></i> 名单二抽中结果

                <div class="result-list" id="list2Result">
                    <div class="result-item list2">等待抽签结果...</div>
                </div>
            </div>
        </div>
    </div>

        function drawSpecialGroup(count) {
            if (count <= 0) return [];
            
            const totalCount = state.list1Count + state.list2Count;
            const bothListsSelected = state.list1Count > 0 && state.list2Count > 0;
            
            let needFromList1 = 0;
            let needFromList2 = 0;
            
            if (bothListsSelected && totalCount >= 10) {
                needFromList1 = 1;
                needFromList2 = 1;
                const remaining = count - 2;
                if (remaining > 0) {
                    for (let i = 0; i < remaining; i++) {
                        if (Math.random() < 0.5) {
                            needFromList1++;
                        } else {
                            needFromList2++;
                        }
                    }
                }
            } else if (state.list1Count > 0 && state.list2Count === 0) {
                needFromList1 = count;
            } else if (state.list2Count > 0 && state.list1Count === 0) {
                needFromList2 = count;
            } else {
                const list1Ratio = state.list1Count / totalCount;
                needFromList1 = Math.round(count * list1Ratio);
                needFromList2 = count - needFromList1;
            }
            
            needFromList1 = Math.min(needFromList1, specialGroupForList1.length);
            needFromList2 = Math.min(needFromList2, specialGroupForList2.length);
            
            if (needFromList1 + needFromList2 < count) {
                const shortfall = count - (needFromList1 + needFromList2);
                if (specialGroupForList1.length > needFromList1) {
                    needFromList1 += Math.min(shortfall, specialGroupForList1.length - needFromList1);
                }
                const remainingShortfall = count - (needFromList1 + needFromList2);
                if (remainingShortfall > 0 && specialGroupForList2.length > needFromList2) {
                    needFromList2 += Math.min(remainingShortfall, specialGroupForList2.length - needFromList2);
                }
            }
            
            const list1SpecialResults = drawSpecialGroupFromList(specialGroupForList1, needFromList1);
            const list2SpecialResults = drawSpecialGroupFromList(specialGroupForList2, needFromList2);
            
            return [...list1SpecialResults, ...list2SpecialResults];
        }

        function drawSpecialGroupFromList(pool, count) {
            if (count <= 0) return [];
            
            let available = [...pool];
            let results = [];
            
            if (state.selectedTailNumber !== null) {
                const tail = state.selectedTailNumber.toString();
                const eligible = available.filter(item => item.endsWith(tail));
                const ineligible = available.filter(item => !item.endsWith(tail));
                
                const eligibleCount = Math.min(count, eligible.length);
                for (let i = 0; i < eligibleCount; i++) {
                    const randomIndex = Math.floor(Math.random() * eligible.length);
                    results.push(eligible[randomIndex]);
                    eligible.splice(randomIndex, 1);
                }
                
                const remaining = count - eligibleCount;
                for (let i = 0; i < remaining; i++) {
                    const randomIndex = Math.floor(Math.random() * ineligible.length);
                    results.push(ineligible[randomIndex]);
                    ineligible.splice(randomIndex, 1);
                }
            } else {
                for (let i = 0; i < count; i++) {
                    const randomIndex = Math.floor(Math.random() * available.length);
                    results.push(available[randomIndex]);
                    available.splice(randomIndex, 1);
                }
            }
            
            return results;
        }

            const actualCount = Math.min(count, pool.length);
            for (let i = 0; i < actualCount; i++) {
                const randomIndex = Math.floor(Math.random() * pool.length);
                results.push(pool[randomIndex]);
                pool.splice(randomIndex, 1);
            }
            return results;
        }

        function prepareRollingDisplay() {
            const rollingArea = document.getElementById('rollingArea');
            rollingArea.innerHTML = '';
            
            const totalSlots = state.list1Results.length + state.list2Results.length;
            
            if (totalSlots === 0) {
                const slot = document.createElement('div');
                slot.className = 'name-slot';
                slot.textContent = '无抽签结果';
                rollingArea.appendChild(slot);
                return;
            }
            
            for (let i = 0; i < totalSlots; i++) {
                const slot = document.createElement('div');
                slot.className = 'name-slot rolling';
                slot.id = `slot-${i}`;
                
                if (i < state.list1Results.length) {
                    slot.classList.add('list1');
                } else {
                    slot.classList.add('list2');
                }
                
                const resultIndex = i < state.list1Results.length ? i : i - state.list1Results.length;
                const resultList = i < state.list1Results.length ? state.list1Results : state.list2Results;
                const resultItem = resultList[resultIndex];
                
                if (specialGroup.includes(resultItem)) {
                    slot.classList.add('special');
                }
                
                rollingArea.appendChild(slot);
            }
        }

        function startRollingAnimation() {
            state.rollSpeed = 50;
            clearInterval(state.rollingInterval);
            
            state.rollingInterval = setInterval(() => {
                updateRollingDisplay();
            }, state.rollSpeed);
        }

        function updateRollingDisplay() {
            const totalSlots = state.list1Results.length + state.list2Results.length;
            
            for (let i = 0; i < totalSlots; i++) {
                const slot = document.getElementById(`slot-${i}`);
                if (!slot) continue;
                
                const isList1 = i < state.list1Results.length;
                const resultList = isList1 ? list1Numbers : list2Numbers;
                
                let randomNumber;
                if (state.selectedTailNumber !== null) {
                    const filteredList = resultList.filter(item => 
                        item.endsWith(state.selectedTailNumber.toString())
                    );
                    if (filteredList.length > 0) {
                        const randomIndex = Math.floor(Math.random() * filteredList.length);
                        randomNumber = filteredList[randomIndex];
                    } else {
                        const randomIndex = Math.floor(Math.random() * resultList.length);
                        randomNumber = resultList[randomIndex];
                    }
                } else {
                    const randomIndex = Math.floor(Math.random() * resultList.length);
                    randomNumber = resultList[randomIndex];
                }
                
                slot.textContent = randomNumber;
            }
        }

        function stopRolling() {
            if (!state.isRolling) return;
            
            state.isRolling = false;
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            
            const slowDown = () => {
                state.rollSpeed += 10;
                
                if (state.rollSpeed >= 200) {
                    clearInterval(state.rollingInterval);
                    showFinalResults();
                    return;
                }
                
                clearInterval(state.rollingInterval);
                state.rollingInterval = setInterval(() => {
                    updateRollingDisplay();
                }, state.rollSpeed);
                
                setTimeout(slowDown, 100);
            };
            
            slowDown();
        }

        function showFinalResults() {
            const totalSlots = state.list1Results.length + state.list2Results.length;
            
            for (let i = 0; i < totalSlots; i++) {
                const slot = document.getElementById(`slot-${i}`);
                if (!slot) continue;
                
                slot.classList.remove('rolling');
                
                const isList1 = i < state.list1Results.length;
                const finalNumber = isList1 ? 
                    state.list1Results[i] : 
                    state.list2Results[i - state.list1Results.length];
                
                slot.textContent = finalNumber;
            }
            
            updateResultDisplay();
        }

        function updateResultDisplay() {
            const list1ResultArea = document.getElementById('list1Result');
            list1ResultArea.innerHTML = '';
            
            if (state.list1Results.length === 0) {
                const emptyItem = document.createElement('div');
                emptyItem.className = 'result-item list1';
                emptyItem.textContent = '未抽取名单一';
                list1ResultArea.appendChild(emptyItem);
            } else {
                let specialCount = 0;
                let highProbCount = 0;
                
                state.list1Results.forEach((number, index) => {
                    const name = list1NameMap[number] || number; 
                    const resultItem = document.createElement('div');
                    resultItem.className = 'result-item list1';
                    
                    if (specialGroup.includes(number)) {
                        resultItem.classList.add('special');
                        resultItem.title = '特定人员组成员';
                        specialCount++;
                    }
                    
                    resultItem.textContent = `${index + 1}. ${name}`;
                    list1ResultArea.appendChild(resultItem);
                });
                               
            }
            
            const list2ResultArea = document.getElementById('list2Result');
            list2ResultArea.innerHTML = '';
            
            if (state.list2Results.length === 0) {
                const emptyItem = document.createElement('div');
                emptyItem.className = 'result-item list2';
                emptyItem.textContent = '未抽取名单二';
                list2ResultArea.appendChild(emptyItem);
            } else {
                let specialCount = 0;
                
                state.list2Results.forEach((number, index) => {
                    const name = list2NameMap[number] || number;
                    const resultItem = document.createElement('div');
                    resultItem.className = 'result-item list2';
                    
                    if (specialGroup.includes(number)) {
                        resultItem.classList.add('special');
                        resultItem.title = '特定人员组成员';
                        specialCount++;
                    }
                    
                    resultItem.textContent = `${index + 1}. ${name}`;
                    list2ResultArea.appendChild(resultItem);
                });
                               
            }
        }

        function resetResults() {
            state.list1Results = [];
            state.list2Results = [];
            
            const rollingArea = document.getElementById('rollingArea');
            rollingArea.innerHTML = '<div class="name-slot">准备开始抽签...</div>';
            
            const list1ResultArea = document.getElementById('list1Result');
            list1ResultArea.innerHTML = '<div class="result-item list1">等待抽签结果...</div>';
            
            const list2ResultArea = document.getElementById('list2Result');
            list2ResultArea.innerHTML = '<div class="result-item list2">等待抽签结果...</div>';
        }

        function resetAll() {
            if (state.isRolling) {
                clearInterval(state.rollingInterval);
                state.isRolling = false;
            }
            
            state.list1Count = 0;
            state.list2Count = 0;
            state.selectedTailNumber = null;
            state.list1Results = [];
            state.list2Results = [];
            state.processLog = [];
            
            document.getElementById('list1Count').value = 0;
            document.getElementById('list2Count').value = 0;
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            
            const allNumbers = document.querySelectorAll('.tail-number');
            allNumbers.forEach(el => {
                el.classList.remove('selected');
                if (el.dataset.number === '') {
                    el.classList.add('selected');
                }
            });
            document.getElementById('tailNote').textContent = '当前未选择尾号，不进行筛选';
            
            resetResults();
            updateSettingsDisplay();
            
            console.log("系统已重置");
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
